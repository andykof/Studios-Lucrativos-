<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studios Lucrativos - Empreendimentos Premium</title>
    
    <!-- Google Fonts para Tipografia Elegante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* 
        ======================================================
           CSS CONSOLIDADO (Variáveis e Estilo Neo-Brutalista) 
        ======================================================
        */
        :root {
            /* Cores Dark Mode Luxury */
            --color-bg-dark: #070707;
            --color-bg-panel: #111111;
            --color-gold: #D4AF37;
            --color-gold-hover: #b8972e;
            --color-text-light: #f4f4f4;
            --color-text-muted: #888888;
            --color-border: #333333;
            
            /* Tipografia */
            --font-body: 'Inter', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-bg-dark);
            color: var(--color-text-light);
            font-family: var(--font-body);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1, h2, h3 {
            font-family: var(--font-heading);
            text-transform: uppercase;
        }

        /* 
        ------------------------------------------
           BOTÕES (Componente Base) 
        ------------------------------------------
        */
        .btn {
            display: inline-block;
            background-color: transparent;
            color: var(--color-gold);
            border: 2px solid var(--color-gold);
            padding: 1rem 2.5rem;
            font-family: var(--font-heading);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            /* Neo-Brutalista: bordas perfeitamente quadradas */
            border-radius: 0; 
        }

        .btn:hover {
            background-color: var(--color-gold);
            color: var(--color-bg-dark);
        }

        .btn-solid {
            background-color: var(--color-gold);
            color: var(--color-bg-dark);
        }

        .btn-solid:hover {
            background-color: transparent;
            color: var(--color-gold);
        }

        /* 
        ------------------------------------------
           HERO SECTION (Split-Screen) 
        ------------------------------------------
        */
        #hero {
            display: flex;
            flex-direction: column; /* Mobile: empilha verticalmente */
            width: 100vw;
            min-height: 100vh;
        }

        .hero-split {
            position: relative;
            flex: 1; /* Ocupa espaço igual no desktop */
            min-height: 50vh; /* Garante visibilidade no mobile */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background-size: cover;
            background-position: center;
        }

        /* Backgrounds Dinâmicos */
        #hero-uniko {
            background-image: url('https://drive.google.com/thumbnail?id=1X6EvakplOf_jL_tWJfyhNll-5SFlE9dy&sz=w1600');
            border-bottom: 2px solid var(--color-border);
        }

        #hero-verus {
            background-image: url('https://offloadmedia.feverup.com/saopaulosecreto.com/wp-content/uploads/2020/07/19075110/%40andreiamarzola-819x1024.jpg');
        }

        /* Overlay Escuro para garantir leitura */
        .hero-split::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(7, 7, 7, 0.85); /* Overlay profundo dark luxury */
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-title {
            font-size: 2.5rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-family: var(--font-body);
            color: var(--color-gold);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* Media Query para layout Desktop - 100% Split Exact */
        @media (min-width: 992px) {
            #hero {
                flex-direction: row; 
            }
            .hero-split {
                width: 50vw;
            }
            #hero-uniko {
                border-bottom: none;
                border-right: 2px solid var(--color-border);
            }
            .hero-title {
                font-size: 4rem;
            }
        }

        /* 
        ------------------------------------------
           MODAL CARROSSEL (Lógica JS / CSS) 
        ------------------------------------------
        */
        #modal-carousel {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #modal-carousel.active {
            display: flex;
        }

        .btn-close-modal {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: transparent;
            border: none;
            color: var(--color-text-light);
            font-size: 3rem;
            cursor: pointer;
            z-index: 10000;
            transition: color 0.3s;
        }

        .btn-close-modal:hover {
            color: var(--color-gold);
        }

        .carousel-view {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carousel-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .carousel-img.active {
            display: block; 
        }

        .carousel-controls {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
            padding: 0 1rem;
            pointer-events: none;
        }

        .btn-nav {
            pointer-events: auto;
            background-color: var(--color-bg-dark);
            color: var(--color-gold);
            border: 2px solid var(--color-gold);
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-nav:hover {
            background-color: var(--color-gold);
            color: var(--color-bg-dark);
        }

        @media (min-width: 992px) {
            .carousel-controls {
                width: 110%;
                left: -5%;
            }
        }

        .carousel-footer {
            height: 100px; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2rem;
        }

        .img-indicator {
            color: var(--color-text-muted);
            font-family: var(--font-body);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .cta-reserve {
            display: none; /* Só visível na Planta (via JS) */
        }

        /* 
        ------------------------------------------
           FORM SECTION (Redirecionamento WhatsApp) 
        ------------------------------------------
        */
        #section-form {
            background-color: var(--color-bg-dark);
            padding: 6rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            background-color: var(--color-bg-panel);
            width: 100%;
            max-width: 480px;
            padding: 3rem 2rem;
            border: 1px solid var(--color-border);
            /* Sem border-radius, padrão brutalista/luxury */
        }

        .form-box h2 {
            color: var(--color-gold);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.6rem;
            letter-spacing: 0.1em;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-light);
            padding: 1rem;
            font-family: inherit;
            font-size: 1rem;
            appearance: none;
            outline: none;
            border-radius: 0;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: var(--color-gold);
        }

        select.form-input {
            cursor: pointer;
        }

        select.form-input option {
            background-color: var(--color-bg-panel);
            color: var(--color-text-light);
        }

        .btn-submit {
            width: 100%;
            margin-top: 1rem;
        }

    </style>
</head>
<body>

    <!-- HERO SPLIT-SCREEN -->
    <header id="hero">
        
        <!-- Lado Esquerdo: UNIKO -->
        <div id="hero-uniko" class="hero-split">
            <div class="hero-content">
                <h1 class="hero-title">Uniko Vila<br>Olímpia</h1>
                <p class="hero-subtitle">Alta Rentabilidade</p>
                <button class="btn" onclick="app.openModal('uniko')">Conheça Mais</button>
            </div>
        </div>

        <!-- Lado Direito: VERUS -->
        <div id="hero-verus" class="hero-split">
            <div class="hero-content">
                <h1 class="hero-title">Verus<br>Mackenzie</h1>
                <p class="hero-subtitle">Localização Premium</p>
                <button class="btn" onclick="app.openModal('verus')">Conheça Mais</button>
            </div>
        </div>

    </header>


    <!-- MODAL CARROUSEL DINÂMICO -->
    <div id="modal-carousel">
        <button class="btn-close-modal" onclick="app.closeModal()">&times;</button>
        
        <div class="carousel-view">
            <!-- Renderização do JS puro -->
            <img id="c-img-0" src="" class="carousel-img" alt="Foto 1 do Empreendimento">
            <img id="c-img-1" src="" class="carousel-img" alt="Foto 2 do Empreendimento">
            <img id="c-img-2" src="" class="carousel-img" alt="Foto 3 do Empreendimento">
            <img id="c-img-3" src="" class="carousel-img" alt="Planta do Imóvel">

            <div class="carousel-controls">
                <button class="btn-nav" onclick="app.prevImage()">&#10094;</button>
                <button class="btn-nav" onclick="app.nextImage()">&#10095;</button>
            </div>
        </div>

        <div class="carousel-footer">
            <span id="carousel-indicator" class="img-indicator">Imagem 1 de 4</span>
            <!-- Botão aparece condicionalmente -->
            <button id="modal-cta-reserve" class="btn btn-solid cta-reserve" onclick="app.actionScrollToForm()">Reservar uma Unidade</button>
        </div>
    </div>


    <!-- FORM SECTION -->
    <section id="section-form">
        <div class="form-box">
            <h2>Garantir Unidade</h2>
            <!-- Captura de submit travada no browser -->
            <form id="leadForm" onsubmit="app.submitToWhatsApp(event)">
                
                <div class="form-group">
                    <label class="form-label" for="nome">Nome Completo</label>
                    <input type="text" id="nome" class="form-input" placeholder="Digite seu nome completo..." required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="empreendimento">Empreendimento de Interesse</label>
                    <select id="empreendimento" class="form-input" required>
                        <option value="Uniko Vila Olímpia">Uniko Vila Olímpia</option>
                        <option value="Verus Mackenzie">Verus Mackenzie</option>
                        <option value="Combo (Uniko + Verus)">Ambos os Ativos (Combo)</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-solid btn-submit">Reservar unidade</button>
            </form>
        </div>
    </section>

    <!-- 
    ======================================================
       JAVASCRIPT VANILLA (Logicas, Events e Flow)
    ======================================================
    -->
    <script>
        const app = (function() {
            
            // 1. Dicionário de Imagens (4 imagens max)
            // A 4ª imagem (índice 3) sempre ativará o CTA da Planta
            const projectData = {
                uniko: [
                    'https://drive.google.com/thumbnail?id=1X6EvakplOf_jL_tWJfyhNll-5SFlE9dy&sz=w1600', 
                    'https://drive.google.com/thumbnail?id=182pxUO-H2meqOc8C1mELz_fGcEiVQTzW&sz=w1600', 
                    'https://drive.google.com/thumbnail?id=1m3R-I4gK4N-4uK-7f0e0H-8b_vXjZ6Dk&sz=w1600', 
                    // Planta hipotética (exemplo prático de link)
                    'https://offloadmedia.feverup.com/saopaulosecreto.com/wp-content/uploads/2020/07/19075110/%40andreiamarzola-819x1024.jpg' 
                ],
                verus: [
                    'https://offloadmedia.feverup.com/saopaulosecreto.com/wp-content/uploads/2020/07/19075110/%40andreiamarzola-819x1024.jpg', 
                    'https://drive.google.com/thumbnail?id=1X6EvakplOf_jL_tWJfyhNll-5SFlE9dy&sz=w1600', 
                    'https://drive.google.com/thumbnail?id=182pxUO-H2meqOc8C1mELz_fGcEiVQTzW&sz=w1600', 
                    // Planta
                    'https://offloadmedia.feverup.com/saopaulosecreto.com/wp-content/uploads/2020/07/19075110/%40andreiamarzola-819x1024.jpg' 
                ]
            };

            let currentActiveProject = null;
            let currentImageIndex = 0;

            // DOM References
            const modalEl = document.getElementById('modal-carousel');
            const btnReserve = document.getElementById('modal-cta-reserve');
            const indicator = document.getElementById('carousel-indicator');

            // --- Lógica: Abertura ---
            function openModal(projectKey) {
                currentActiveProject = projectKey;
                currentImageIndex = 0; // Reinicia slider
                
                const images = projectData[projectKey];

                // Popular DOM com as fotos selecionadas
                for(let i = 0; i < 4; i++) {
                    const imgElement = document.getElementById('c-img-' + i);
                    imgElement.src = images[i];
                }

                renderCarouselState();
                modalEl.classList.add('active'); // O CSS ativa o display fader
            }

            function closeModal() {
                modalEl.classList.remove('active');
                currentActiveProject = null;
            }

            // --- Lógica: Navegação ---
            function nextImage() {
                currentImageIndex++;
                if(currentImageIndex >= 4) currentImageIndex = 0; // Loop infinito
                renderCarouselState();
            }

            function prevImage() {
                currentImageIndex--;
                if(currentImageIndex < 0) currentImageIndex = 3; 
                renderCarouselState();
            }

            // --- Lógica Principal: Rastreamento do índice Ativo da Planta ---
            function renderCarouselState() {
                // Toggles de imagens DOM
                for(let i = 0; i < 4; i++) {
                    const imgElement = document.getElementById('c-img-' + i);
                    if(i === currentImageIndex) {
                        imgElement.classList.add('active');
                    } else {
                        imgElement.classList.remove('active');
                    }
                }

                // CTA Aparece APENAS no índice 3 (Planta do Imóvel / Quarta imagem)
                if(currentImageIndex === 3) {
                    btnReserve.style.display = 'inline-block';
                    indicator.style.display = 'none'; 
                } else {
                    btnReserve.style.display = 'none';
                    indicator.style.display = 'block';
                    indicator.textContent = `Imagem ${currentImageIndex + 1} de 4`;
                }
            }

            // --- Lógica UX: Ação "Reservar" ---
            function actionScrollToForm() {
                closeModal();
                
                // Pré-popula select do projeto baseado em qual galeria estavamos olhando
                const selectEl = document.getElementById('empreendimento');
                if(currentActiveProject === 'uniko') selectEl.value = "Uniko Vila Olímpia";
                if(currentActiveProject === 'verus') selectEl.value = "Verus Mackenzie";

                // Direciona fluidamente
                const formSection = document.getElementById('section-form');
                formSection.scrollIntoView({ behavior: 'smooth' });
                
                setTimeout(() => document.getElementById('nome').focus(), 600);
            }

            // --- Lógica Final: WhatsApp Sem Server-side postback ---
            function submitToWhatsApp(event) {
                event.preventDefault(); 

                const nome = document.getElementById('nome').value.trim();
                const empreendimento = document.getElementById('empreendimento').value;

                if(!nome) return;

                const rawMessage = `Olá! Meu nome é *${nome}* e tenho interesse em garantir uma unidade no *${empreendimento}*. Gostaria de saber mais informações.`;
                
                const encodedMessage = encodeURIComponent(rawMessage);
                
                // Adicione o Tel final de disparo da equipe do studio Lucrativos
                const whatsappNumber = "5511959568043"; 

                const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;

                // Pop-up na URL nativa via Web API
                window.open(whatsappUrl, '_blank');
            }

            return {
                openModal,
                closeModal,
                nextImage,
                prevImage,
                actionScrollToForm,
                submitToWhatsApp
            };

        })();
    </script>
</body>
</html>
